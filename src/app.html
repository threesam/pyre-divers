<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#e25822" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cg transform='rotate(180 16 16)' stroke='%23212614' stroke-width='2.6' stroke-linecap='round' fill='none'%3E%3Ccircle cx='16' cy='7' r='3.4'/%3E%3Cpath d='M16 10.5 L16 20 M16 13 L9 17 M16 13 L23 17 M16 20 L11 27 M16 20 L21 27'/%3E%3C/g%3E%3C/svg%3E"
    />
    <script>
      // pre-paint gate: arriving from threesam.com (?dive) opens on the
      // garden's marigold so the hand-off reads as one continuous scene.
      // Landing only — elsewhere nothing would ever clean the class up.
      if (
        location.pathname === '/' &&
        new URLSearchParams(location.search).has('dive')
      )
        document.documentElement.classList.add('diving');
    </script>
    <style>
      /* inline so the very first paint is marigold even before the
         stylesheet arrives — the hand-off can't flash any other color */
      html.diving {
        background: #e8a317;
      }
    </style>
    <script>
      // testing eject: ?test flips umami's native kill switch for this
      // browser (persistent); ?test=0 rejoins. The tracker checks
      // localStorage before every send — no custom gating needed.
      try {
        var q = new URLSearchParams(location.search);
        if (q.has('test')) {
          q.get('test') === '0'
            ? localStorage.removeItem('umami.disabled')
            : localStorage.setItem('umami.disabled', '1');
        }
      } catch (e) {}
    </script>
    <link rel="preconnect" href="https://analytics.sixtom.com" crossorigin />
    <script
      defer
      src="https://analytics.sixtom.com/script.js"
      data-website-id="7dbed7cf-d9b7-44d9-b131-09aec78b0ef3"
      data-domains="pyredivers.com"
    ></script>
    %sveltekit.head%
  </head>
  <body>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
