  html { height: 100%; }
  body {
    margin: 0; height: 100%;
    overflow-y: auto; overflow-x: hidden;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
    background: #000; color: #e7e2da;
    font-family: 'Comfortaa', ui-rounded, system-ui, sans-serif;
  }
  section { position: relative; height: 100vh; height: 100dvh; scroll-snap-align: start; scroll-snap-stop: always; overflow: hidden; }
  #splash {
    background-color: #e25822;
    background-image:
      radial-gradient(circle at 16% 84%, #b91c1c 0%, rgba(185, 28, 28, 0) 72%),
      radial-gradient(circle at 78% 16%, #f5b942 0%, rgba(245, 185, 66, 0) 66%);
  }
  #sea { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  .wordmark {
    position: absolute; inset: 0; margin: 0;
    display: grid; place-items: center;
    pointer-events: none; user-select: none;
    font-family: 'Comfortaa', ui-rounded, system-ui, sans-serif;
    font-weight: 700;
    font-size: clamp(2.2rem, min(15vmax, 14vw), 17rem);
    word-spacing: -0.06em;
    line-height: 1;
  }
  .wordmark .line { white-space: nowrap; transform: translateY(-0.05em); }
  .wordmark .w { color: #ffffff; }
  .wordmark .k { color: #212614; }
  .down {
    position: absolute; bottom: max(20px, env(safe-area-inset-bottom)); left: 50%;
    transform: translateX(-50%);
    color: #ffffff; z-index: 2; line-height: 0; padding: 6px;
    animation: bob 2.2s ease-in-out infinite;
  }
  .down:focus-visible { outline: 2px solid #fff; outline-offset: 2px; border-radius: 8px; }
  @keyframes bob { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, 8px); } }
  @media (prefers-reduced-motion: reduce) { .down { animation: none; } }
  #join { display: grid; place-items: center; background: #000; padding: 1.25rem; }
  #rain { position: absolute; inset: 0; width: 100%; height: 100%; }
  .card {
    position: relative; z-index: 1; background: #000;
    max-width: 26rem; width: 100%;
    border: 2px solid #57492f;
    border-radius: 255px 18px 225px 18px / 18px 225px 18px 255px;
    padding: 2rem 1.6rem 1.7rem;
    display: grid; gap: 1rem;
  }
  .fire {
    margin: 0; font-size: 1.9rem; font-weight: 700; letter-spacing: -0.01em; text-wrap: balance;
    background: linear-gradient(100deg, #f5b942 10%, #e25822 50%, #b91c1c 90%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .card p { margin: 0; color: #b7ad9d; font-size: 0.95rem; line-height: 1.55; }
  .card form { display: grid; gap: 0.8rem; }
  .fieldwrap {
    padding: 2px;
    border-radius: 200px 14px 180px 14px / 14px 180px 14px 200px;
    background: #57492f; /* resting ring = the hand-drawn border */
  }
  .fieldwrap:focus-within {
    background: linear-gradient(100deg, #f5b942, #e25822, #b91c1c); /* the fire ring */
  }
  .fieldwrap input {
    width: 100%; box-sizing: border-box; display: block;
    background: #000; color: #e7e2da;
    border: none; outline: none;
    border-radius: 198px 12px 178px 12px / 12px 178px 12px 198px;
    padding: 0.85rem 1rem; font: inherit; font-size: 1rem;
  }
  .fieldwrap input::placeholder { color: #6d6450; }
  button.join {
    font: inherit; font-weight: 700; font-size: 1rem;
    border: none; cursor: pointer;
    border-radius: 200px 14px 180px 14px / 14px 180px 14px 200px;
    padding: 0.85rem 1rem;
    background: linear-gradient(100deg, #f5b942, #e25822, #b91c1c);
    color: #1c1917;
  }
  button.join:focus-visible { outline: 2px solid #f5b942; outline-offset: 3px; }
  .tiny { font-size: 0.78rem; color: #7d745f; }
  @media (max-width: 768px) { .card { border: none; padding: 1.2rem 0.6rem; } }
</style>
</head>
<body>
<section id="splash" aria-label="pyre divers — the whirlpool">
<canvas id="sea" aria-hidden="true"></canvas>
<h1 class="wordmark"><span class="line"><span class="w">pyre </span><span class="k">divers</span></span></h1>
<a class="down" href="#join" aria-label="scroll down — join the list">
<svg width="34" height="30" viewBox="0 0 34 30" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 4 L17 13 L29 4"/><path d="M5 15 L17 24 L29 15"/></svg>
</a>
</section>
<section id="join">
<canvas id="rain" aria-hidden="true"></canvas>
<div class="card">
<h2 class="fire">come sit by the fire.</h2>
<p>two builders, live. no script. no polish. no edits.<br>conversations with the ones who jumped before they were ready.<br>first dive: august 2026.</p>
<form id="join-form" novalidate>
<div class="fieldwrap">
<input name="email" type="email" inputmode="email" autocomplete="email" placeholder="your@email.com" aria-label="email address" required>
</div>
<button class="join" type="submit">save me a seat.</button>
</form>
<p class="tiny">no spam. one email when the fire’s lit. rss soon.</p>
</div>
</section>

<script>
(() => {
  'use strict';
  // ── seeded rng: the same souls every load
  function mulberry32(a) {
    return () => {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  const TAU = Math.PI * 2, PI = Math.PI;
  const INK = [0x21 / 255, 0x26 / 255, 0x14 / 255]; // olive-black

  // geometry — matched to the cover artwork
  const LANES = 3;
  const R_START = 0.72;                        // spiral starts past every corner
  const K = 0.02124;                           // log-spiral pitch
  const H_MIN = 0.005;                         // size floor
  const GAP = 1 - Math.exp(-TAU * K / LANES);  // ring gap as a fraction of r
  const PHI_T = Math.log(R_START / 0.004) / K; // fallback: full span rim → drain
  const OMEGA = TAU / 64;                      // fallback rotation: one rev per 64 s
  const TILT = PI + Math.atan(K);              // rail heading: tangent + pitch
  const HEAD_PX = 9;                           // bodies at least this tall get a head

  // ── pose library: diver / spread-eagle / arms-up / reach / tuck, all jittered
  function makePose(rand) {
    const t = rand();
    const J = () => (rand() - 0.5) * 0.26;
    let aL, aR, lL, lR, arm = 1, leg = 1;
    if (t < 0.30)      { aL =  PI * 0.66; aR =  PI * 0.34; lL = PI * 0.5 + 0.18; lR = PI * 0.5 - 0.18; }
    else if (t < 0.50) { aL = -PI * 0.78; aR = -PI * 0.22; lL = PI * 0.5 + 0.34; lR = PI * 0.5 - 0.34; }
    else if (t < 0.70) { aL = -PI * 0.60; aR = -PI * 0.40; lL = PI * 0.5 + 0.12; lR = PI * 0.5 - 0.12; }
    else if (t < 0.90) { aL = -PI * 0.55; aR =  PI * 0.42; lL = PI * 0.5 + 0.10; lR = PI * 0.5 - 0.26; }
    else               { aL =  PI * 0.80; aR =  PI * 0.20; lL = PI * 0.5 + 0.46; lR = PI * 0.5 - 0.46; arm = leg = 0.62; }
    return {
      aL: aL + J(), aR: aR + J(), lL: lL + J(), lR: lR + J(),
      arm: arm * (0.88 + rand() * 0.24), leg: leg * (0.88 + rand() * 0.24),
    };
  }

  function dress(b, rand) {
    b.drift = ((rand() + rand()) - 1) * 0.8 * GAP;
    b.size = 0.86 + rand() * 0.26;
    if (b.lane !== undefined) {
      b.off = b.lane * (TAU / LANES) + (rand() - 0.5) * 0.03;
      b.r0 = R_START * Math.exp(-K * b.phi);
    }
    const hJit = (rand() - 0.5) * 0.55 + (rand() < 0.07 ? (rand() - 0.5) * 2.4 : 0);
    b.hJit = hJit;
    b.cR = Math.cos(TILT + hJit); b.sR = Math.sin(TILT + hJit);
    b.cJ = Math.cos(hJit); b.sJ = Math.sin(hJit); // jitter alone, for velocity-oriented bodies
    const p = makePose(rand);
    b.arm = 0.36 * p.arm; b.leg = 0.36 * p.leg;
    b.aLx = Math.cos(p.aL); b.aLy = Math.sin(p.aL);
    b.aRx = Math.cos(p.aR); b.aRy = Math.sin(p.aR);
    b.lLx = Math.cos(p.lL); b.lLy = Math.sin(p.lL);
    b.lRx = Math.cos(p.lR); b.lRy = Math.sin(p.lR);
    return b;
  }

  // full-spiral rail population — used by the Canvas2D fallback only
  const bodies = [];
  {
    const rand = mulberry32(420);
    for (let lane = 0; lane < LANES; lane++) {
      const n = Math.round(15.4 * PHI_T);
      const w = Array.from({ length: n }, () => 0.78 + rand() * 0.44);
      const total = w.reduce((a, b) => a + b, 0);
      let acc = 0;
      for (let i = 0; i < n; i++) {
        acc += w[i];
        bodies.push(dress({ lane, phi: (acc / total) * PHI_T }, rand));
      }
    }
  }
  const pile = [];
  {
    const rand = mulberry32(4200);
    for (let i = 0; i < 60; i++) {
      pile.push(dress({ a: rand() * TAU, r: 0.018 * Math.pow(rand(), 0.7) }, rand));
    }
  }

  function addBody(p, px, py, cR, sR, h, b, withHead) {
    const fx = -sR, fy = cR;
    const s2 = h * 0.21;
    p.moveTo(px - fx * s2, py - fy * s2); p.lineTo(px + fx * s2, py + fy * s2);
    if (withHead) {
      const hd = h * 0.11, hx0 = px - fx * (s2 + hd), hy0 = py - fy * (s2 + hd);
      p.moveTo(hx0 + hd, hy0); p.arc(hx0, hy0, hd, 0, TAU);
    }
    const sx = px - fx * h * 0.105, sy = py - fy * h * 0.105;
    const hx = px + fx * s2, hy = py + fy * s2;
    const aL = h * b.arm, lL = h * b.leg;
    p.moveTo(sx, sy); p.lineTo(sx + (b.aLx * cR - b.aLy * sR) * aL, sy + (b.aLx * sR + b.aLy * cR) * aL);
    p.moveTo(sx, sy); p.lineTo(sx + (b.aRx * cR - b.aRy * sR) * aL, sy + (b.aRx * sR + b.aRy * cR) * aL);
    p.moveTo(hx, hy); p.lineTo(hx + (b.lLx * cR - b.lLy * sR) * lL, hy + (b.lLx * sR + b.lLy * cR) * lL);
    p.moveTo(hx, hy); p.lineTo(hx + (b.lRx * cR - b.lRy * sR) * lL, hy + (b.lRx * sR + b.lRy * cR) * lL);
  }

  // ── flow model (shared by sim + fallback tuning): constant deceleration —
  // v² = V_E² + C2·(r − R_E), so every body sheds speed at one steady rate and
  // arrives at the disc edge moving at the disc's spin speed.
  const W_CORE = TAU / 24;                 // the disc's spin
  const V_RIM_W = (TAU / 70) * R_START;    // angular pace anchor at the rim
  let R_CORE = 0.05, R_E = 0.046, V_E = 0.012, C2 = 0.02;
  function tune(fontDevPx, S) {
    R_CORE = 0.315 * fontDevPx / S;
    R_E = 0.92 * R_CORE;
    V_E = W_CORE * R_E;
    C2 = (V_RIM_W * V_RIM_W - V_E * V_E) / (R_START - R_E);
  }
  const speedN = rn => Math.sqrt(Math.max(V_E * V_E + C2 * (rn - R_E), 0.25 * V_E * V_E));

  // field styles (physics-driven bodies)
  const field = [];
  {
    const rand = mulberry32(777);
    const N = 6000; // dense enough that the carved letterforms stay crisp
    for (let i = 0; i < N; i++) {
      const b = dress({ lane: i % LANES, phi: 0 }, rand);
      b.frac = (i + 0.25 + rand() * 0.5) / N;
      field.push(b);
    }
  }

  // phyllotaxis (sunflower) core: golden-angle packing fills the disc evenly —
  // crisp edge, readable bodies to dead center. Regenerated per resize, count
  // tied to area so the packing density holds.
  function makeCore() {
    const rand = mulberry32(4200);
    const n = Math.max(60, Math.round(PI * R_CORE * R_CORE / Math.pow(1.16 * H_MIN, 2)));
    const GOLD = PI * (3 - Math.sqrt(5));
    const out = [];
    for (let i = 0; i < n; i++) {
      const b = dress({}, rand);
      b.ang0 = i * GOLD + (rand() - 0.5) * 0.15;
      b.radFrac = Math.sqrt((i + 0.5) / n) * (1 + (rand() - 0.5) * 0.06);
      out.push(b);
    }
    return out;
  }

  const canvas = document.getElementById('sea');
  const dpr = Math.min(window.devicePixelRatio || 1, 1.75);
  let seaVisible = true;
  if ('IntersectionObserver' in window) {
    new IntersectionObserver(es => { seaVisible = es[0].isIntersecting; }, { threshold: 0.02 })
      .observe(document.getElementById('splash'));
  }
  const still = matchMedia('(prefers-reduced-motion: reduce)').matches;
  let W = 0, H = 0, S = 0;      // device px
  let cw = 0, ch = 0, Scss = 0; // css px (sim space)

  function measure() {
    // layout viewport, not visual: stable under pinch zoom
    cw = document.documentElement.clientWidth; ch = document.documentElement.clientHeight;
    W = Math.round(cw * dpr);
    H = Math.round(ch * dpr);
    S = Math.round(0.70 * Math.hypot(W, H)); // diagonal-based: corners covered at any aspect
    Scss = S / dpr;
    canvas.width = W; canvas.height = H;
    // pin the element to the measured px — iOS in-app browsers stretch 100vh past
    // the visible viewport, which displaced the whole field below the wordmark
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
  }

  // ════════════════════════════════════════════════════════════════════════
  // WebGL2: the field is a real particle sim (transform feedback, garden-style).
  // The vortex is a steering force; "pyre" is a collision obstacle — bodies
  // deflect off the letterforms, so the word stays carved out of the crowd.
  // Per frame the CPU issues one update pass + two instanced draws.
  // ════════════════════════════════════════════════════════════════════════
  function startGL(gl) {
    measure();
    const N_F = field.length;

    const SIM_VS = `#version 300 es
    precision highp float;
    in vec2 a_position;
    in vec2 a_velocity;
    uniform vec2 u_res;        // css px
    uniform float u_dt;        // 60fps-frame units
    uniform vec2 u_center;
    uniform float u_Scss;
    uniform float u_VE;
    uniform float u_C2;
    uniform float u_RE;
    uniform float u_time;
    out vec2 v_position;
    out vec2 v_velocity;
    const float K = ${K};

    float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }

    void main() {
      vec2 pos = a_position;
      vec2 vel = a_velocity;

      // steer toward the decelerating current (px per frame)
      vec2 rel = pos - u_center;
      float r = max(length(rel), 1e-3);
      float rn = r / u_Scss;
      vec2 radial = rel / r;
      vec2 tang = vec2(-radial.y, radial.x);
      float vmag = sqrt(max(u_VE * u_VE + u_C2 * (rn - u_RE), 0.25 * u_VE * u_VE));
      float vpf = vmag * u_Scss / 60.0;             // local current, px per frame
      vec2 vdes = normalize(tang - radial * K) * vpf;
      vel += (vdes - vel) * min(0.16 * u_dt, 1.0); // firm steering — the flow closes behind the letters
      // smooth per-body wander (not white noise — that made bodies twirl on their
      // axis): a gentle force whose direction eases to a new random heading every
      // ~1.5s, proportional to the local current. Wakes refill, headings stay calm.
      float id = float(gl_VertexID);
      float tt = u_time * 0.66;
      float ft = floor(tt), s = smoothstep(0.0, 1.0, fract(tt));
      vec2 n0 = vec2(hash(vec2(id, ft)),       hash(vec2(id + 7.0, ft)))       - 0.5;
      vec2 n1 = vec2(hash(vec2(id, ft + 1.0)), hash(vec2(id + 7.0, ft + 1.0))) - 0.5;
      vel += mix(n0, n1, s) * vpf * min(0.16 * u_dt, 1.0);

      pos += vel * u_dt;
      vel *= pow(0.97, u_dt); // bleed cursor impulse; steering re-energizes

      // swallowed by the disc (or lost past the rim) → resurface at the rim
      float rn2 = length(pos - u_center) / u_Scss;
      if (rn2 < u_RE * 0.98 || rn2 > 0.745) {
        float a = hash(pos + vel) * 6.2831853;
        vec2 dir = vec2(cos(a), sin(a));
        pos = u_center + dir * ${R_START} * u_Scss;
        vec2 t2 = vec2(-dir.y, dir.x);
        vel = normalize(t2 - dir * K) * sqrt(u_VE * u_VE + u_C2 * (${R_START} - u_RE)) * u_Scss / 60.0;
      }

      v_position = pos;
      v_velocity = vel;
      gl_Position = vec4(0.0);
    }`;

    const SIM_FS = `#version 300 es
    precision mediump float;
    out vec4 o;
    void main() { o = vec4(0.0); }`;

    const VS = `#version 300 es
    precision highp float;
    uniform vec2 uRes;      // device px
    uniform float uS;       // device px
    uniform float uDpr;
    uniform float uSpin;
    uniform float uCore;
    uniform float uRCORE;
    uniform float uRE;
    layout(location=0) in vec3 aTpl;  // segId, end(0|1), side(-1|1)
    layout(location=1) in vec4 aA;    // core: ang0, radFrac, 0, size · field: 0,0,0,size
    layout(location=2) in vec4 aB;    // core: rotC, rotS · field: cos(jit), sin(jit) · zw: armLen, legLen
    layout(location=3) in vec4 aC;    // armL dir, armR dir
    layout(location=4) in vec4 aD;    // legL dir, legR dir
    layout(location=5) in vec2 aPos;  // field only: css px (instanced, from the sim)
    layout(location=6) in vec2 aVel;  // field only
    out vec2 vLocal;
    out float vHalfLen;
    out float vHalfW;
    out float vHead;
    out float vFade;

    const float K = ${K};
    const float H_MIN = ${H_MIN};

    void main() {
      vec2 center;
      float h, cR, sR;
      vFade = 1.0;
      if (uCore > 0.5) {
        float ang = aA.x + uSpin;            // the sunflower disc spins as one
        float r = aA.y * uRCORE;
        vFade = smoothstep(uRE * 0.3, uRE * 3.2, r); // same long ramp as the field — one smooth dim
        float ca = cos(ang), sa = sin(ang);
        center = uRes * 0.5 + vec2(ca, sa) * r * uS;
        h = max(0.052 * r, H_MIN) * aA.w * uS;
        cR = ca * aB.x - sa * aB.y;
        sR = sa * aB.x + ca * aB.y;
      } else {
        vec2 pC = aPos * uDpr;
        vec2 rel = pC - uRes * 0.5;
        float rn = max(length(rel), 1e-3) / uS;
        center = pC;
        h = max(0.052 * rn, H_MIN) * aA.w * uS;
        // head-first along the velocity, plus the personal jitter
        vec2 vdir = normalize(aVel + vec2(1e-5, 0.0));
        float c0 = -vdir.y, s0 = vdir.x;
        cR = c0 * aB.x - s0 * aB.y;
        sR = s0 * aB.x + c0 * aB.y;
        vFade = smoothstep(uRE * 0.3, uRE * 3.2, rn); // long ramp: outpaces the crowding, no dark ring
      }

      float w = max(uS * 0.0008, 0.09 * h);
      float halfW = w * 0.5 + 1.0;
      vHalfW = w * 0.5;

      int seg = int(aTpl.x + 0.5);
      vHead = seg == 5 ? 1.0 : 0.0;

      vec2 p0, p1;
      if      (seg == 0) { p0 = vec2(0.0, -0.21); p1 = vec2(0.0, 0.21); }
      else if (seg == 1) { p0 = vec2(0.0, -0.105); p1 = p0 + aC.xy * aB.z; }
      else if (seg == 2) { p0 = vec2(0.0, -0.105); p1 = p0 + aC.zw * aB.z; }
      else if (seg == 3) { p0 = vec2(0.0, 0.21);  p1 = p0 + aD.xy * aB.w; }
      else if (seg == 4) { p0 = vec2(0.0, 0.21);  p1 = p0 + aD.zw * aB.w; }
      else               { p0 = vec2(0.0, -0.32); p1 = p0; }

      mat2 R = mat2(cR, sR, -sR, cR);
      vec2 W0 = center + R * (p0 * h);
      vec2 W1 = center + R * (p1 * h);

      vec2 pos;
      if (seg == 5) {
        float headR = 0.11 * h;
        vHalfLen = headR;
        float ext = headR + halfW;
        vLocal = vec2(aTpl.z, aTpl.y * 2.0 - 1.0) * ext;
        pos = W0 + vLocal;
        if (h < float(${HEAD_PX})) pos = W0;
      } else {
        vec2 d = W1 - W0;
        float len = max(length(d), 1e-4);
        vec2 t = d / len;
        vec2 nrm = vec2(-t.y, t.x);
        vHalfLen = len * 0.5;
        float along = mix(-(vHalfLen + halfW), vHalfLen + halfW, aTpl.y);
        vLocal = vec2(along, aTpl.z * halfW);
        pos = (W0 + W1) * 0.5 + t * along + nrm * (aTpl.z * halfW);
      }
      gl_Position = vec4(pos.x / uRes.x * 2.0 - 1.0, 1.0 - pos.y / uRes.y * 2.0, 0.0, 1.0);
    }`;

    const FS = `#version 300 es
    precision highp float;
    uniform vec3 uInk;
    in vec2 vLocal;
    in float vHalfLen;
    in float vHalfW;
    in float vHead;
    in float vFade;
    out vec4 frag;
    void main() {
      float d;
      if (vHead > 0.5) {
        d = abs(length(vLocal) - vHalfLen);
      } else {
        vec2 q = vec2(max(abs(vLocal.x) - vHalfLen, 0.0), vLocal.y);
        d = length(q);
      }
      float a = (1.0 - smoothstep(vHalfW - 0.75, vHalfW + 0.75, d)) * vFade;
      if (a <= 0.001) discard;
      frag = vec4(uInk * a, a);
    }`;

    function compile(type, src) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
      return s;
    }
    function link(vs, fs, tf) {
      const p = gl.createProgram();
      gl.attachShader(p, compile(gl.VERTEX_SHADER, vs));
      gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fs));
      if (tf) gl.transformFeedbackVaryings(p, tf, gl.SEPARATE_ATTRIBS);
      gl.linkProgram(p);
      if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
      return p;
    }
    const simProg = link(SIM_VS, SIM_FS, ['v_position', 'v_velocity']);
    const prog = link(VS, FS);

    // template: 6 segments × two triangles
    const tpl = [];
    for (let seg = 0; seg < 6; seg++) {
      const c = [[0, -1], [0, 1], [1, -1], [1, 1]];
      for (const i of [0, 1, 2, 2, 1, 3]) tpl.push(seg, c[i][0], c[i][1]);
    }
    const tplBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, tplBuf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(tpl), gl.STATIC_DRAW);

    function styleBuffer(list, pack) {
      const f = new Float32Array(list.length * 16);
      let o = 0;
      for (const b of list) {
        pack(b, f, o); o += 4;
        f[o++] = b.cJ; f[o++] = b.sJ; f[o++] = b.arm; f[o++] = b.leg;
        f[o++] = b.aLx; f[o++] = b.aLy; f[o++] = b.aRx; f[o++] = b.aRy;
        f[o++] = b.lLx; f[o++] = b.lLy; f[o++] = b.lRx; f[o++] = b.lRy;
      }
      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, f, gl.STATIC_DRAW);
      return { buf, count: list.length };
    }
    // field style: jitter-oriented (cJ/sJ); core style: rail-oriented (cR/sR)
    const flowStyle = styleBuffer(field, (b, f, o) => { f[o + 3] = b.size; });
    let drain = null;
    function rebuildCore() {
      const list = makeCore();
      const f = new Float32Array(list.length * 16);
      let o = 0;
      for (const b of list) {
        f[o] = b.ang0; f[o + 1] = b.radFrac; f[o + 3] = b.size; o += 4;
        f[o++] = b.cR; f[o++] = b.sR; f[o++] = b.arm; f[o++] = b.leg;
        f[o++] = b.aLx; f[o++] = b.aLy; f[o++] = b.aRx; f[o++] = b.aRy;
        f[o++] = b.lLx; f[o++] = b.lLy; f[o++] = b.lRx; f[o++] = b.lRy;
      }
      if (!drain) drain = { buf: gl.createBuffer(), count: 0 };
      gl.bindBuffer(gl.ARRAY_BUFFER, drain.buf);
      gl.bufferData(gl.ARRAY_BUFFER, f, gl.STATIC_DRAW);
      drain.count = list.length;
    }

    // particle state (ping-pong)
    const posBufs = [gl.createBuffer(), gl.createBuffer()];
    const velBufs = [gl.createBuffer(), gl.createBuffer()];
    let active = 0;

    function seedParticles() {
      const P = new Float32Array(N_F * 2);
      const V = new Float32Array(N_F * 2);
      const cx = cw / 2, cy = ch / 2;
      for (let i = 0; i < N_F; i++) {
        const b = field[i];
        const w = V_E + (V_RIM_W - V_E) * b.frac;
        const r0 = R_E + (w * w - V_E * V_E) / C2;
        const rn = r0 * (1 + b.drift);
        const ang = Math.log(R_START / r0) / K + b.off;
        const px = cx + Math.cos(ang) * rn * Scss;
        const py = cy + Math.sin(ang) * rn * Scss;
        P[i * 2] = px; P[i * 2 + 1] = py;
        const rel = [px - cx, py - cy];
        const r = Math.max(Math.hypot(rel[0], rel[1]), 1e-3);
        const tang = [-rel[1] / r, rel[0] / r];
        const rad = [rel[0] / r, rel[1] / r];
        let dx = tang[0] - rad[0] * K, dy = tang[1] - rad[1] * K;
        const dl = Math.hypot(dx, dy);
        const v = speedN(r / Scss) * Scss / 60;
        V[i * 2] = (dx / dl) * v; V[i * 2 + 1] = (dy / dl) * v;
      }
      for (let i = 0; i < 2; i++) {
        gl.bindBuffer(gl.ARRAY_BUFFER, posBufs[i]);
        gl.bufferData(gl.ARRAY_BUFFER, P, gl.DYNAMIC_COPY);
        gl.bindBuffer(gl.ARRAY_BUFFER, velBufs[i]);
        gl.bufferData(gl.ARRAY_BUFFER, V, gl.DYNAMIC_COPY);
      }
    }

    // VAOs — sim reads pos/vel (locations queried: that shader has no layouts);
    // render adds template + style + instanced state
    const sPosLoc = gl.getAttribLocation(simProg, 'a_position');
    const sVelLoc = gl.getAttribLocation(simProg, 'a_velocity');
    const simVaos = [gl.createVertexArray(), gl.createVertexArray()];
    for (let i = 0; i < 2; i++) {
      gl.bindVertexArray(simVaos[i]);
      gl.bindBuffer(gl.ARRAY_BUFFER, posBufs[i]);
      gl.enableVertexAttribArray(sPosLoc);
      gl.vertexAttribPointer(sPosLoc, 2, gl.FLOAT, false, 0, 0);
      gl.bindBuffer(gl.ARRAY_BUFFER, velBufs[i]);
      gl.enableVertexAttribArray(sVelLoc);
      gl.vertexAttribPointer(sVelLoc, 2, gl.FLOAT, false, 0, 0);
    }
    function bindCommon(styleBuf) {
      gl.bindBuffer(gl.ARRAY_BUFFER, tplBuf);
      gl.enableVertexAttribArray(0);
      gl.vertexAttribPointer(0, 3, gl.FLOAT, false, 12, 0);
      gl.bindBuffer(gl.ARRAY_BUFFER, styleBuf);
      for (let loc = 1; loc <= 4; loc++) {
        gl.enableVertexAttribArray(loc);
        gl.vertexAttribPointer(loc, 4, gl.FLOAT, false, 64, (loc - 1) * 16);
        gl.vertexAttribDivisor(loc, 1);
      }
    }
    const renderVaos = [gl.createVertexArray(), gl.createVertexArray()];
    for (let i = 0; i < 2; i++) {
      gl.bindVertexArray(renderVaos[i]);
      bindCommon(flowStyle.buf);
      gl.bindBuffer(gl.ARRAY_BUFFER, posBufs[i]);
      gl.enableVertexAttribArray(5);
      gl.vertexAttribPointer(5, 2, gl.FLOAT, false, 0, 0);
      gl.vertexAttribDivisor(5, 1);
      gl.bindBuffer(gl.ARRAY_BUFFER, velBufs[i]);
      gl.enableVertexAttribArray(6);
      gl.vertexAttribPointer(6, 2, gl.FLOAT, false, 0, 0);
      gl.vertexAttribDivisor(6, 1);
    }
    let coreVao = null;
    function rebuildCoreVao() {
      if (!coreVao) coreVao = gl.createVertexArray();
      gl.bindVertexArray(coreVao);
      bindCommon(drain.buf);
      gl.bindVertexArray(null);
    }

    // uniforms
    const sU = {};
    for (const n of ['u_res', 'u_dt', 'u_center', 'u_Scss', 'u_VE', 'u_C2', 'u_RE', 'u_time'])
      sU[n] = gl.getUniformLocation(simProg, n);
    const rU = {};
    for (const n of ['uRes', 'uS', 'uDpr', 'uSpin', 'uCore', 'uRCORE', 'uRE', 'uInk'])
      rU[n] = gl.getUniformLocation(prog, n);

    gl.enable(gl.BLEND);
    gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);
    gl.clearColor(0, 0, 0, 0);

    let spin = 0;
    function step(dt) {
      gl.useProgram(simProg);
      gl.uniform2f(sU.u_res, cw, ch);
      gl.uniform1f(sU.u_dt, dt);
      gl.uniform2f(sU.u_center, cw / 2, ch / 2);
      gl.uniform1f(sU.u_Scss, Scss);
      gl.uniform1f(sU.u_VE, V_E);
      gl.uniform1f(sU.u_C2, C2);
      gl.uniform1f(sU.u_RE, R_E);
      gl.uniform1f(sU.u_time, performance.now() * 0.001);
      const out = 1 - active;
      gl.bindVertexArray(simVaos[active]);
      gl.bindBufferBase(gl.TRANSFORM_FEEDBACK_BUFFER, 0, posBufs[out]);
      gl.bindBufferBase(gl.TRANSFORM_FEEDBACK_BUFFER, 1, velBufs[out]);
      gl.enable(gl.RASTERIZER_DISCARD);
      gl.beginTransformFeedback(gl.POINTS);
      gl.drawArrays(gl.POINTS, 0, N_F);
      gl.endTransformFeedback();
      gl.disable(gl.RASTERIZER_DISCARD);
      gl.bindBufferBase(gl.TRANSFORM_FEEDBACK_BUFFER, 0, null);
      gl.bindBufferBase(gl.TRANSFORM_FEEDBACK_BUFFER, 1, null);
      active = out;
    }

    function draw() {
      gl.useProgram(prog);
      gl.viewport(0, 0, W, H);
      gl.uniform2f(rU.uRes, W, H);
      gl.uniform1f(rU.uS, S);
      gl.uniform1f(rU.uDpr, dpr);
      gl.uniform1f(rU.uSpin, spin);
      gl.uniform1f(rU.uRCORE, R_CORE);
      gl.uniform1f(rU.uRE, R_E);
      gl.uniform3fv(rU.uInk, INK);
      gl.clear(gl.COLOR_BUFFER_BIT);
      gl.uniform1f(rU.uCore, 0);
      gl.bindVertexArray(renderVaos[active]);
      gl.drawArraysInstanced(gl.TRIANGLES, 0, 36, N_F);
      gl.uniform1f(rU.uCore, 1);
      gl.bindVertexArray(coreVao);
      gl.drawArraysInstanced(gl.TRIANGLES, 0, 36, drain.count);
      gl.bindVertexArray(null);
    }

    let seededW = 0;
    function fit() {
      measure();
      const fontPx = parseFloat(getComputedStyle(document.querySelector('.wordmark')).fontSize);
      tune(fontPx * dpr, S);
      // reseed only on real width changes (rotation, window resize) — iOS scroll
      // collapses browser chrome and fires height-only resizes; resetting the
      // crowd for those reads as a glitch. The current re-centers bodies itself.
      if (cw !== seededW) { seedParticles(); seededW = cw; }
      rebuildCore();
      rebuildCoreVao();
    }

    const boot = () => {
      fit();
      draw();
      if (!still) {
        let last = performance.now();
        const loop = now => {
          if (!seaVisible) { last = now; requestAnimationFrame(loop); return; }
          const dt = Math.min((now - last) / 16.67, 3); // 60fps-frame units
          last = now;
          step(dt);
          spin += W_CORE * dt / 60;
          draw();
          requestAnimationFrame(loop);
        };
        requestAnimationFrame(loop);
      }
      let rT;
      const onRs = () => {
        if (window.visualViewport && visualViewport.scale !== 1) return; // pinch zoom isn't a resize
        const de = document.documentElement;
        if (de.clientWidth === cw && de.clientHeight === ch) return;     // nothing actually changed
        clearTimeout(rT); rT = setTimeout(() => { fit(); draw(); }, 150);
      };
      addEventListener('resize', onRs);
      if (window.visualViewport) visualViewport.addEventListener('resize', onRs); // in-app browser chrome shifts
    };
    // wait for the wordmark font so first paint and sizing agree
    if (document.fonts && document.fonts.load) {
      document.fonts.load("700 100px 'Comfortaa'").then(boot, boot);
    } else boot();
  }

  // ════════════════════════════════════════════════════════════════════════
  // Canvas2D fallback: bake the crowd once, rotate the image — a spinning
  // log-spiral reads as suction. No carving here, so "pyre" paints white.
  // ════════════════════════════════════════════════════════════════════════
  function startCanvas2D(ctx) {
    document.documentElement.classList.add('no-gl');
    let ground = null, baked = null, L = 0, CX = 0, CY = 0;
    const CUTS = [18, 30, 48, 72];

    function bake() {
      L = Math.ceil(1.44 * S) + 8;
      baked = document.createElement('canvas');
      baked.width = baked.height = L;
      const c = baked.getContext('2d');
      const paths = [new Path2D(), new Path2D(), new Path2D(), new Path2D(), new Path2D()];
      for (const b of bodies) {
        const r = b.r0 * (1 + b.drift);
        const ang = b.phi + b.off;
        const ca = Math.cos(ang), sa = Math.sin(ang);
        const px = L / 2 + ca * r * S, py = L / 2 + sa * r * S;
        const h = Math.max(0.052 * r, H_MIN) * b.size * S;
        const cR = ca * b.cR - sa * b.sR, sR = sa * b.cR + ca * b.sR;
        const k = h < CUTS[0] ? 0 : h < CUTS[1] ? 1 : h < CUTS[2] ? 2 : h < CUTS[3] ? 3 : 4;
        addBody(paths[k], px, py, cR, sR, h, b, h >= HEAD_PX);
      }
      for (const b of pile) {
        const rot = b.a * 7;
        addBody(paths[0], L / 2 + Math.cos(b.a) * b.r * S, L / 2 + Math.sin(b.a) * b.r * S,
                Math.cos(rot), Math.sin(rot), H_MIN * b.size * S, b, false);
      }
      c.strokeStyle = '#212614'; c.lineJoin = 'round';
      const widths = [S * 8e-4, Math.max(S * 8e-4, 2.2 * dpr), 3.5 * dpr, 5.3 * dpr, 7.8 * dpr];
      for (let k = 0; k < 5; k++) {
        c.lineWidth = widths[k];
        c.lineCap = k < 2 ? 'butt' : 'round';
        c.stroke(paths[k]);
      }
    }

    function paintGround(c) {
      c.fillStyle = '#e25822';
      c.fillRect(0, 0, W, H);
      let g = c.createRadialGradient(W * 0.16, H * 0.84, 0, W * 0.16, H * 0.84, S * 1.05);
      g.addColorStop(0, '#b91c1c'); g.addColorStop(1, 'rgba(185,28,28,0)');
      c.fillStyle = g; c.fillRect(0, 0, W, H);
      g = c.createRadialGradient(W * 0.78, H * 0.16, 0, W * 0.78, H * 0.16, S * 0.95);
      g.addColorStop(0, '#f5b942'); g.addColorStop(1, 'rgba(245,185,66,0)');
      c.fillStyle = g; c.fillRect(0, 0, W, H);
    }

    function fit() {
      measure();
      CX = W / 2; CY = H / 2;
      ground = document.createElement('canvas');
      ground.width = W; ground.height = H;
      paintGround(ground.getContext('2d'));
      bake();
    }

    let theta = 0;
    function frame(c) {
      c.setTransform(1, 0, 0, 1, 0, 0);
      c.drawImage(ground, 0, 0);
      c.translate(CX, CY);
      c.rotate(theta);
      c.drawImage(baked, -L / 2, -L / 2);
      c.setTransform(1, 0, 0, 1, 0, 0);
    }

    fit();
    frame(ctx);
    addEventListener('resize', () => { fit(); frame(ctx); });
    if (!still) {
      let last = performance.now();
      const loop = now => {
        if (!seaVisible) { last = now; requestAnimationFrame(loop); return; }
        const dt = Math.min((now - last) / 1000, 0.05);
        last = now;
        theta += OMEGA * dt;
        frame(ctx);
        requestAnimationFrame(loop);
      };
      requestAnimationFrame(loop);
    }
  }

  // ── the list (listmonk) — fill url + list uuid once the box is live
  const LISTMONK = { url: '', list: '' };
  const joinForm = document.getElementById('join-form');
  joinForm.addEventListener('submit', async e => {
    e.preventDefault();
    const email = joinForm.email.value.trim();
    const btn = joinForm.querySelector('button');
    if (!email || !email.includes('@')) { btn.textContent = 'needs a real email.'; return; }
    if (!LISTMONK.url) { btn.textContent = "you\u2019re early. list opens with episode one."; return; }
    btn.disabled = true; btn.textContent = 'joining…';
    try {
      const r = await fetch(LISTMONK.url + '/api/public/subscription', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, list_uuids: [LISTMONK.list] }),
      });
      btn.textContent = r.ok ? 'you\u2019re in. see you at the fire.' : 'didn\u2019t take. try again?';
    } catch (err) {
      btn.textContent = 'didn\u2019t take. try again?';
    }
    btn.disabled = false;
  });

  // ── hard paging between the two screens: wheel + keys flip exactly one page;
  // touch keeps native mandatory snap (already one-screen-per-swipe)
  {
    const scroller = document.scrollingElement || document.documentElement;
    const pages = [document.getElementById('splash'), document.getElementById('join')];
    let lock = false, cur = 0;
    const go = i => {
      i = Math.max(0, Math.min(pages.length - 1, i));
      if (i === cur) return;
      lock = true; cur = i;
      pages[i].scrollIntoView({ behavior: still ? 'auto' : 'smooth' });
      setTimeout(() => { lock = false; }, 750);
    };
    addEventListener('wheel', e => {
      e.preventDefault();
      if (lock || Math.abs(e.deltaY) < 12) return;
      go(cur + (e.deltaY > 0 ? 1 : -1));
    }, { passive: false });
    addEventListener('keydown', e => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') && e.key === ' ') return;
      if (['ArrowDown', 'PageDown', ' '].includes(e.key)) { e.preventDefault(); go(cur + 1); }
      else if (['ArrowUp', 'PageUp'].includes(e.key)) { e.preventDefault(); go(cur - 1); }
    });
    addEventListener('scroll', () => {
      if (!lock) cur = Math.round(scroller.scrollTop / document.documentElement.clientHeight);
    }, { passive: true });
  }

  // ── screen two: white divers falling through the black
  (function rain() {
    const c = document.getElementById('rain');
    const ctx2 = c.getContext('2d');
    const rand = mulberry32(77);
    const drops = [];
    for (let i = 0; i < 70; i++) {
      const b = dress({}, rand);
      b.x = rand(); b.y = rand();
      b.v = 0.02 + rand() * 0.035;            // viewport-heights per second
      b.swayPh = rand() * TAU; b.swayA = 6 + rand() * 12;
      b.rot = PI + (rand() - 0.5) * 0.5;      // head-first down, loosely
      drops.push(b);
    }
    let rw = 0, rh = 0;
    function sizeRain() {
      const de = document.documentElement;
      rw = Math.round(de.clientWidth * dpr); rh = Math.round(de.clientHeight * dpr);
      c.width = rw; c.height = rh;
      c.style.width = de.clientWidth + 'px'; c.style.height = de.clientHeight + 'px';
    }
    sizeRain();
    addEventListener('resize', sizeRain);
    let joinVisible = false;
    if ('IntersectionObserver' in window) {
      new IntersectionObserver(es => { joinVisible = es[0].isIntersecting; }, { threshold: 0.02 })
        .observe(document.getElementById('join'));
    } else joinVisible = true;
    function drawRain(t) {
      ctx2.clearRect(0, 0, rw, rh);
      ctx2.strokeStyle = '#ffffff'; ctx2.lineCap = 'round'; ctx2.lineJoin = 'round';
      ctx2.globalAlpha = 0.92;
      const h0 = 0.02 * S; // same visual scale as the vortex crowd
      const path = new Path2D();
      for (const b of drops) {
        const px = b.x * rw + Math.sin(t * 0.6 + b.swayPh) * b.swayA * dpr;
        addBody(path, px, b.y * rh, Math.cos(b.rot), Math.sin(b.rot), h0 * b.size, b, h0 * b.size >= HEAD_PX);
      }
      ctx2.lineWidth = Math.max(S * 0.0008, h0 * 0.09);
      ctx2.stroke(path);
    }
    if (still) { drawRain(8); return; }
    let last = performance.now();
    const loop = now => {
      if (!joinVisible) { last = now; requestAnimationFrame(loop); return; }
      const dt = Math.min((now - last) / 1000, 0.05);
      last = now;
      for (const b of drops) { b.y += b.v * dt; if (b.y > 1.06) { b.y = -0.08; b.x = rand(); } }
      drawRain(now / 1000);
      requestAnimationFrame(loop);
    };
    requestAnimationFrame(loop);
  })();

  const gl = canvas.getContext('webgl2', { alpha: true, antialias: false, premultipliedAlpha: true });
  if (gl) {
    try { startGL(gl); } catch (e) { startCanvas2D(canvas.getContext('2d')); }
  } else {
    startCanvas2D(canvas.getContext('2d'));
  }
})();
</script>
</body>
